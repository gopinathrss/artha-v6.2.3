  - id: P-055
    title: "SIP day consistency reduces timing bias"
    principle: "Investing on a fixed day of the month (e.g., the 14th) regardless of market conditions removes emotional decision points. If the market is down on your SIP day, you buy more units; if it is up, fewer. Over years this dollar-cost-averaging mechanically smooths entry price."
    tags: [sip, behavioral]
    confidence: 0.88
    sources: ["Vanguard DCA research"]
