  - id: P-060
    title: "Behavioral skip patterns reveal misalignment"
    principle: "If a user repeatedly skips the same recommendation (e.g., 3 months of skipping a rebalance sell), the recommendation likely doesn't fit their actual preferences. Either the threshold is too aggressive, the explanation lacks resonance, or the user has constraints the system doesn't know about. Adapt rather than repeat."
    tags: [behavioral, ai]
    confidence: 0.82
    sources: ["Artha outcome analytics"]
