# Example Nginx server block — adjust paths, SSL, and domain.
server {
    listen 443 ssl http2;
    server_name artha.example.com;

    ssl_certificate     /etc/letsencrypt/live/artha.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artha.example.com/privkey.pem;

    client_max_body_size 10m;

    location /charts/ {
        alias /var/www/artha/src/dashboard/charts/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location /scripts/ {
        alias /var/www/artha/src/dashboard/scripts/;
        expires 1d;
    }
    location /styles/ {
        alias /var/www/artha/src/dashboard/styles/;
        expires 1d;
    }
    location /vendor/echarts/ {
        alias /var/www/artha/node_modules/echarts/dist/;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        gzip on;
        gzip_types text/plain text/css application/javascript application/json;
    }
}
