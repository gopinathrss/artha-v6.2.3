<!doctype html>
<html lang="en" class="preload">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PIE — Library</title>
    <script src="/scripts/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Main navigation"></aside>
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <main class="main-area">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="topbar-menu-trigger"
              aria-label="Open menu"
              id="menu-toggle"
              type="button"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                aria-hidden="true"
              >
                <path d="M2 4 H14 M2 8 H14 M2 12 H14" />
              </svg>
            </button>
            <h1 class="topbar-page-title">Library</h1>
          </div>
          <div class="topbar-actions">
            <button
              class="btn btn-ghost btn-sm"
              id="refresh-btn"
              aria-label="Refresh"
              type="button"
            >
              Refresh
            </button>
          </div>
        </header>

        <div class="content">
          <section class="overview-hero" id="hero">
            <div class="hero-eyebrow">Instrument library</div>
            <div class="hero-value-row">
              <div class="hero-value" id="hero-count">—</div>
            </div>
            <div class="hero-meta">Funds vetted by PIE across George availability</div>

            <div class="hero-stats">
              <div class="hero-stat">
                <div class="hero-stat-label">Available in George</div>
                <div class="hero-stat-value" id="stat-george">—</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-label">Average score</div>
                <div class="hero-stat-value" id="stat-avg-score">—</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-label">Average TER</div>
                <div class="hero-stat-value" id="stat-avg-ter">—</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-label">Equity / Bonds / Cash</div>
                <div class="hero-stat-value" id="stat-mix">—</div>
              </div>
            </div>
          </section>

          <section class="card" style="margin-bottom: var(--space-5);">
            <div class="card-header">
              <div>
                <h2 class="card-title">Filters</h2>
                <p class="card-subtitle">Narrow the table</p>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="filter-category">Category</label>
                <select id="filter-category" class="form-field-select">
                  <option value="">All</option>
                  <option value="EQUITY">Equity</option>
                  <option value="BONDS">Bonds</option>
                  <option value="CASH">Cash</option>
                  <option value="COMMODITY">Commodity</option>
                </select>
              </div>
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="filter-search">Search</label>
                <input
                  id="filter-search"
                  type="search"
                  class="form-field-input"
                  placeholder="Name or ISIN…"
                />
              </div>
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label">George availability</label>
                <label class="toggle-row" style="border: none; padding: var(--space-1) 0;">
                  <span class="toggle-row-text">
                    <span class="toggle-row-title">Only available in George</span>
                  </span>
                  <span class="toggle">
                    <input type="checkbox" id="filter-george" checked />
                    <span class="toggle-slider"></span>
                  </span>
                </label>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div>
                <h2 class="card-title">Library</h2>
                <p class="card-subtitle" id="lib-subtitle">Loading…</p>
              </div>
            </div>
            <div class="table-wrap">
              <table class="table" id="lib-table">
                <thead>
                  <tr>
                    <th scope="col">Fund</th>
                    <th scope="col">Category</th>
                    <th class="num" scope="col">TER %</th>
                    <th class="num" scope="col">3yr return</th>
                    <th scope="col">Score</th>
                    <th scope="col">In George</th>
                  </tr>
                </thead>
                <tbody id="lib-tbody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="/scripts/sidebar.js"></script>
    <script src="/scripts/shell.js"></script>
    <script src="/scripts/library.js"></script>
  </body>
</html>
