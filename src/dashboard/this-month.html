<!doctype html>
<html lang="en" class="preload">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ARTHA — This Month</title>
    <script src="/scripts/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Main navigation"></aside>
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <main class="main-area">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="topbar-menu-trigger"
              aria-label="Open menu"
              id="menu-toggle"
              type="button"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                aria-hidden="true"
              >
                <path d="M2 4 H14 M2 8 H14 M2 12 H14" />
              </svg>
            </button>
            <h1 class="topbar-page-title">This Month</h1>
          </div>
          <div class="topbar-actions">
            <button
              class="btn btn-ghost btn-sm"
              id="refresh-btn"
              aria-label="Refresh"
              type="button"
            >
              Refresh
            </button>
            <button class="btn btn-primary btn-sm" id="generate-btn" type="button">
              Generate plan
            </button>
          </div>
        </header>

        <div class="content">
          <section class="card" id="summary-card" style="margin-bottom: var(--space-5);">
            <div class="empty-state">
              <div class="empty-state-message">Loading…</div>
            </div>
          </section>

          <div id="rows-container"></div>
        </div>
      </main>
    </div>

    <script src="/scripts/sidebar.js"></script>
    <script src="/scripts/shell.js"></script>
    <script src="/scripts/this-month.js"></script>
  </body>
</html>
