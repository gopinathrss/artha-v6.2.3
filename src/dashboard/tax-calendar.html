<!doctype html>
<html lang="en" class="preload">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PIE — Tax Calendar</title>
    <script src="/scripts/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Main navigation"></aside>
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <main class="main-area">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="topbar-menu-trigger"
              aria-label="Open menu"
              id="menu-toggle"
              type="button"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                aria-hidden="true"
              >
                <path d="M2 4 H14 M2 8 H14 M2 12 H14" />
              </svg>
            </button>
            <h1 class="topbar-page-title">Tax Calendar</h1>
          </div>
          <div class="topbar-actions">
            <button
              class="btn btn-ghost btn-sm"
              id="refresh-btn"
              aria-label="Refresh"
              type="button"
            >
              Refresh
            </button>
          </div>
        </header>

        <div class="content">
          <section class="overview-hero" id="hero">
            <div class="hero-eyebrow">Czech 3-year rule</div>
            <div class="hero-value-row">
              <div class="hero-value" id="hero-locked">—</div>
            </div>
            <div class="hero-meta">Total value still inside the tax-window across all holdings</div>

            <div class="hero-stats">
              <div class="hero-stat">
                <div class="hero-stat-label">Tax-free now</div>
                <div class="hero-stat-value" id="stat-now">—</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-label">Within 90 days</div>
                <div class="hero-stat-value" id="stat-90">—</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-label">Within 1 year</div>
                <div class="hero-stat-value" id="stat-365">—</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-label">Holdings tracked</div>
                <div class="hero-stat-value" id="stat-total">—</div>
              </div>
            </div>
          </section>

          <section class="card" style="margin-bottom: var(--space-5);">
            <div class="card-header">
              <div>
                <h2 class="card-title">Imminent — next 90 days</h2>
                <p class="card-subtitle" id="imminent-subtitle">—</p>
              </div>
            </div>
            <div id="imminent-list"></div>
          </section>

          <section class="card" style="margin-bottom: var(--space-5);">
            <div class="card-header">
              <div>
                <h2 class="card-title">Within 1 year</h2>
                <p class="card-subtitle" id="upcoming-subtitle">—</p>
              </div>
            </div>
            <div id="upcoming-list"></div>
          </section>

          <section class="card">
            <div class="card-header">
              <div>
                <h2 class="card-title">Already tax-free</h2>
                <p class="card-subtitle" id="free-subtitle">—</p>
              </div>
              <a href="/this-month" class="btn btn-ghost btn-sm">Plan a sell</a>
            </div>
            <div id="free-list"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="/scripts/sidebar.js"></script>
    <script src="/scripts/shell.js"></script>
    <script src="/scripts/tax-calendar.js"></script>
  </body>
</html>
