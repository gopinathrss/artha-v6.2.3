<!doctype html>
<html lang="en" class="preload">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ARTHA — Finances</title>
    <script src="/scripts/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Main navigation"></aside>
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <main class="main-area">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="topbar-menu-trigger"
              aria-label="Open menu"
              id="menu-toggle"
              type="button"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                aria-hidden="true"
              >
                <path d="M2 4 H14 M2 8 H14 M2 12 H14" />
              </svg>
            </button>
            <h1 class="topbar-page-title">Finances</h1>
          </div>
          <div class="topbar-actions">
            <button class="btn btn-ghost btn-sm" id="refresh-btn" type="button">Refresh</button>
            <button class="btn btn-primary btn-sm" id="save-profile-btn" type="button">Save profile</button>
          </div>
        </header>

        <div class="content settings-stack">
          <section class="card">
            <div class="card-header">
              <div>
                <h2 class="card-title">Profile</h2>
                <p class="card-subtitle">Used by This-month planner and retirement projections.</p>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label class="form-field-label" for="p_name">Full name</label>
                <input id="p_name" type="text" class="form-field-input" />
              </div>
              <div class="form-field">
                <label class="form-field-label" for="p_dob">Date of birth</label>
                <input id="p_dob" type="date" class="form-field-input" />
              </div>
              <div class="form-field">
                <label class="form-field-label" for="p_currency">Home currency</label>
                <select id="p_currency" class="form-field-select">
                  <option value="CZK">CZK</option>
                  <option value="EUR">EUR</option>
                  <option value="INR">INR</option>
                  <option value="USD">USD</option>
                </select>
              </div>
              <div class="form-field">
                <label class="form-field-label" for="p_residency">Tax residency</label>
                <input id="p_residency" type="text" class="form-field-input" maxlength="2" />
              </div>
              <div class="form-field">
                <label class="form-field-label" for="p_risk">Risk profile</label>
                <select id="p_risk" class="form-field-select">
                  <option value="CONSERVATIVE">Conservative</option>
                  <option value="MODERATE">Moderate</option>
                  <option value="GROWTH">Growth</option>
                </select>
              </div>
              <div class="form-field">
                <label class="form-field-label" for="p_income">Net income (CZK / month)</label>
                <input id="p_income" type="number" min="0" step="1000" class="form-field-input" />
              </div>
              <div class="form-field">
                <label class="form-field-label" for="p_salary_day">Salary day</label>
                <input id="p_salary_day" type="number" min="1" max="28" class="form-field-input" />
              </div>
              <div class="form-field">
                <label class="form-field-label" for="p_sip_day">SIP day</label>
                <input id="p_sip_day" type="number" min="1" max="28" class="form-field-input" />
              </div>
              <div class="form-field">
                <label class="form-field-label" for="p_emergency">Emergency target (CZK)</label>
                <input id="p_emergency" type="number" min="0" step="10000" class="form-field-input" />
              </div>
              <div class="form-field">
                <label class="form-field-label" for="p_ret_age">Retirement age</label>
                <input id="p_ret_age" type="number" min="40" max="80" class="form-field-input" />
              </div>
              <div class="form-field">
                <label class="form-field-label" for="p_ret_exp">Retirement spend (CZK / month)</label>
                <input id="p_ret_exp" type="number" min="0" step="1000" class="form-field-input" />
              </div>
            </div>
            <div class="form-field" style="margin-top: var(--space-2);">
              <label class="form-field-label" for="p_notes">Notes</label>
              <textarea id="p_notes" class="form-field-textarea"></textarea>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div>
                <h2 class="card-title">Income events</h2>
                <p class="card-subtitle" id="income-subtitle">—</p>
              </div>
            </div>
            <div class="table-wrap">
              <table class="table" id="income-table">
                <thead>
                  <tr>
                    <th scope="col">Date</th>
                    <th scope="col">Source</th>
                    <th class="num" scope="col">Amount</th>
                    <th scope="col">Recurring</th>
                    <th scope="col"></th>
                  </tr>
                </thead>
                <tbody id="income-tbody"></tbody>
              </table>
            </div>
            <div class="form-row" style="margin-top: var(--space-4);">
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="i_date">Date</label>
                <input id="i_date" type="date" class="form-field-input" />
              </div>
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="i_src">Source</label>
                <input id="i_src" type="text" class="form-field-input" placeholder="SALARY" />
              </div>
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="i_amt">Amount (CZK)</label>
                <input id="i_amt" type="number" min="0" step="1" class="form-field-input" />
              </div>
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label">Recurring</label>
                <label class="toggle-row" style="border: none; padding: var(--space-1) 0;">
                  <span class="toggle-row-text"><span class="toggle-row-title">Every month</span></span>
                  <span class="toggle">
                    <input type="checkbox" id="i_rec" />
                    <span class="toggle-slider"></span>
                  </span>
                </label>
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary btn-sm" id="add-income" type="button">Add income</button>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div>
                <h2 class="card-title">Fixed expenses</h2>
                <p class="card-subtitle" id="expenses-subtitle">—</p>
              </div>
            </div>
            <div class="table-wrap">
              <table class="table" id="expenses-table">
                <thead>
                  <tr>
                    <th scope="col">Category</th>
                    <th scope="col">Description</th>
                    <th class="num" scope="col">Amount</th>
                    <th scope="col">Frequency</th>
                    <th scope="col"></th>
                  </tr>
                </thead>
                <tbody id="expenses-tbody"></tbody>
              </table>
            </div>
            <div class="form-row" style="margin-top: var(--space-4);">
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="e_cat">Category</label>
                <input id="e_cat" type="text" class="form-field-input" placeholder="RENT" />
              </div>
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="e_desc">Description</label>
                <input id="e_desc" type="text" class="form-field-input" placeholder="Brno rent" />
              </div>
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="e_amt">Amount (CZK)</label>
                <input id="e_amt" type="number" min="0" step="100" class="form-field-input" />
              </div>
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="e_freq">Frequency</label>
                <select id="e_freq" class="form-field-select">
                  <option value="MONTHLY">Monthly</option>
                  <option value="QUARTERLY">Quarterly</option>
                  <option value="YEARLY">Yearly</option>
                  <option value="ONE_TIME">One-time</option>
                </select>
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary btn-sm" id="add-expense" type="button">Add expense</button>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div>
                <h2 class="card-title">Upcoming events</h2>
                <p class="card-subtitle" id="events-subtitle">—</p>
              </div>
            </div>
            <div class="table-wrap">
              <table class="table" id="events-table">
                <thead>
                  <tr>
                    <th scope="col">Date</th>
                    <th scope="col">Title</th>
                    <th scope="col">Category</th>
                    <th class="num" scope="col">Budget</th>
                    <th class="num" scope="col">Reserved</th>
                    <th scope="col"></th>
                  </tr>
                </thead>
                <tbody id="events-tbody"></tbody>
              </table>
            </div>
            <div class="form-row" style="margin-top: var(--space-4);">
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="v_date">Date</label>
                <input id="v_date" type="date" class="form-field-input" />
              </div>
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="v_title">Title</label>
                <input id="v_title" type="text" class="form-field-input" placeholder="Prague trip" />
              </div>
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="v_cat">Category</label>
                <input id="v_cat" type="text" class="form-field-input" placeholder="TRAVEL" />
              </div>
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="v_budget">Budget (CZK)</label>
                <input id="v_budget" type="number" min="0" step="1000" class="form-field-input" />
              </div>
              <div class="form-field" style="margin: 0;">
                <label class="form-field-label" for="v_res">Reserved (CZK)</label>
                <input id="v_res" type="number" min="0" step="1000" class="form-field-input" value="0" />
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary btn-sm" id="add-event" type="button">Add event</button>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="/scripts/sidebar.js"></script>
    <script src="/scripts/shell.js"></script>
    <script src="/scripts/finances.js"></script>
  </body>
</html>
