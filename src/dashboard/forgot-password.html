<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PIE — Forgot password</title>
    <link rel="icon" href="/assets/pie-logo.svg" type="image/svg+xml" />
    <script src="/scripts/theme.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/index.css" />
    <style>
      .auth-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-6);
        background: radial-gradient(120% 80% at 50% -20%, var(--surface-2), var(--surface-0));
      }
      .auth-card {
        width: 100%;
        max-width: 26rem;
        padding: var(--space-6);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        background: var(--surface-1);
      }
    </style>
  </head>
  <body>
    <div class="auth-wrap">
      <div class="auth-card">
        <h1 class="card-title" style="margin: 0 0 var(--space-2)">Forgot password</h1>
        <p class="form-field-help">Enter the same address as <strong>Alert email</strong> in Settings → Notifications (saved in the database).</p>
        <div class="form-field" style="margin-top: var(--space-4)">
          <label class="form-field-label" for="em">Email</label>
          <input id="em" type="email" class="form-field-input" autocomplete="email" />
        </div>
        <button type="button" class="btn btn-primary" id="btn-forgot" style="margin-top: var(--space-3); width: 100%">
          Send reset link
        </button>
        <p class="form-field-help" id="msg" style="margin-top: var(--space-3)" aria-live="polite"></p>
        <p class="form-field-help" style="margin-top: var(--space-4)"><a href="/login.html">Back to sign in</a></p>
      </div>
    </div>
    <script src="/scripts/forgot-password.js"></script>
  </body>
</html>
