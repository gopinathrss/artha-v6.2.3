<!doctype html>
<html lang="en" class="preload">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ARTHA — Overview</title>
    <script src="/scripts/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <div id="demoBanner" class="demo-banner" style="display: none" role="status">
      DEMO MODE ACTIVE — Simulated Portfolio
    </div>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Primary">
        <div class="sidebar-brand">
          <div class="sidebar-brand-mark" aria-hidden="true">A</div>
          <div class="sidebar-brand-name">ARTHA</div>
        </div>

        <nav class="sidebar-section">
          <div class="sidebar-section-label">Workspace</div>
          <ul class="sidebar-nav">
            <li class="sidebar-nav-item">
              <a href="/" data-page="overview">
                <svg
                  class="sidebar-nav-item-icon"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  aria-hidden="true"
                >
                  <path d="M2 8 L8 2 L14 8 V14 H2 Z" />
                </svg>
                Overview
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="/portfolio" data-page="portfolio">
                <svg
                  class="sidebar-nav-item-icon"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  aria-hidden="true"
                >
                  <circle cx="8" cy="8" r="6" />
                  <path d="M8 2 V8 L13 8" />
                </svg>
                Portfolio
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="/this-month" data-page="this-month">
                <svg
                  class="sidebar-nav-item-icon"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  aria-hidden="true"
                >
                  <rect x="2" y="3" width="12" height="11" rx="1" />
                  <path d="M2 6 H14 M5 1 V5 M11 1 V5" />
                </svg>
                This month
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="/onboarding" data-page="onboarding" data-artha-setup-nav>
                <svg
                  class="sidebar-nav-item-icon"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  aria-hidden="true"
                >
                  <path d="M8 2 L10 6 L14 7 L10 8 L8 12 L6 8 L2 7 L6 6 Z" />
                </svg>
                <span class="artha-setup-label">Setup</span>
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="/india" data-page="india">
                <svg
                  class="sidebar-nav-item-icon"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  aria-hidden="true"
                >
                  <path d="M2 8 H14 M2 4 H14 M2 12 H14" />
                </svg>
                India
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="/finances" data-page="finances">
                <svg
                  class="sidebar-nav-item-icon"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  aria-hidden="true"
                >
                  <rect x="2" y="2" width="12" height="12" rx="1" />
                  <path d="M4 6 H12 M4 10 H10" />
                </svg>
                Finances
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="/tax-calendar" data-page="tax-calendar">
                <svg
                  class="sidebar-nav-item-icon"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  aria-hidden="true"
                >
                  <circle cx="8" cy="8" r="6" />
                  <path d="M8 4 V8 L11 10" />
                </svg>
                Tax calendar
              </a>
            </li>
          </ul>
        </nav>

        <nav class="sidebar-section">
          <div class="sidebar-section-label">Intelligence</div>
          <ul class="sidebar-nav">
            <li class="sidebar-nav-item">
              <a href="/intelligence" data-page="intelligence">
                <svg
                  class="sidebar-nav-item-icon"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  aria-hidden="true"
                >
                  <circle cx="8" cy="8" r="3" />
                  <path d="M8 2 V4 M8 12 V14 M2 8 H4 M12 8 H14 M3.5 3.5 L5 5 M11 11 L12.5 12.5 M3.5 12.5 L5 11 M11 5 L12.5 3.5" />
                </svg>
                Ask ARTHA
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="/library" data-page="library">
                <svg
                  class="sidebar-nav-item-icon"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  aria-hidden="true"
                >
                  <rect x="2" y="3" width="12" height="11" rx="1" />
                  <path d="M5 7 H11 M5 10 H9" />
                </svg>
                Library
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="/reports" data-page="reports">
                <svg
                  class="sidebar-nav-item-icon"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  aria-hidden="true"
                >
                  <rect x="3" y="2" width="10" height="12" rx="1" />
                  <path d="M5 5 H11 M5 8 H11 M5 11 H8" />
                </svg>
                Reports
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="/alerts" data-page="alerts">
                <svg
                  class="sidebar-nav-item-icon"
                  viewBox="0 0 16 16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  aria-hidden="true"
                >
                  <path d="M3 12 H13 L12 7 A4 4 0 0 0 4 7 Z M6 13 A2 2 0 0 0 10 13" />
                </svg>
                Alerts
              </a>
            </li>
          </ul>
        </nav>

        <div class="sidebar-footer">
          <a href="/settings" class="sidebar-footer-link">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <circle cx="8" cy="8" r="2" />
              <path d="M8 1 V3 M8 13 V15 M1 8 H3 M13 8 H15" />
            </svg>
            Settings
          </a>
          <div id="sidebar-trust-badge" style="margin-top: var(--space-2); font-size: var(--text-xs); color: var(--color-text-tertiary); padding: 0 var(--space-2)">
            Trust: <span id="trust-score">—</span>
          </div>
        </div>
      </aside>

      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <main class="main-area">
        <header class="topbar">
          <div style="display: flex; align-items: center; gap: var(--space-3)">
            <button type="button" class="topbar-menu-trigger" aria-label="Open menu" id="menu-toggle">
              <svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path d="M2 4 H14 M2 8 H14 M2 12 H14" />
              </svg>
            </button>
            <h1 class="topbar-page-title" id="page-title">Overview</h1>
          </div>
          <div class="topbar-actions" id="topbar-actions"></div>
        </header>

        <div class="content" id="content">
          <p class="body-sm text-secondary">Loading overview…</p>
        </div>
      </main>
    </div>

    <script src="/scripts/shell.js"></script>
  </body>
</html>
