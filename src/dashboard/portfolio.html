<!doctype html>
<html lang="en" class="preload">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PIE — Portfolio</title>
    <script src="/scripts/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Main navigation"></aside>
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <main class="main-area">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="topbar-menu-trigger"
              aria-label="Open menu"
              id="menu-toggle"
              type="button"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                aria-hidden="true"
              >
                <path d="M2 4 H14 M2 8 H14 M2 12 H14" />
              </svg>
            </button>
            <h1 class="topbar-page-title">Portfolio</h1>
          </div>
          <div class="topbar-actions">
            <span id="page-health-dot"></span>
            <button class="btn btn-ghost btn-sm" id="strategy-eval-btn" type="button">
              Run strategy evaluation
            </button>
            <button class="btn btn-ghost btn-sm" id="refresh-nav-btn" type="button">
              Refresh NAVs
            </button>
            <button class="btn btn-ghost btn-sm" id="refresh-btn" type="button">Refresh</button>
            <button class="btn btn-primary btn-sm" id="add-holding-btn" type="button">
              + Add holding
            </button>
          </div>
        </header>

        <div class="content">
          <section class="overview-hero" id="hero">
            <div class="hero-eyebrow">Czech mutual funds</div>
            <div class="hero-value-row">
              <div class="hero-value" id="hero-total">—</div>
            </div>
            <div class="hero-meta" id="hero-sub">—</div>
            <p
              id="hero-invested-hint"
              class="callout callout-info"
              style="display: none; margin-top: var(--space-3); margin-bottom: 0; font-size: var(--text-sm)"
              role="status"
            ></p>

            <div class="hero-stats">
              <div class="hero-stat">
                <div class="hero-stat-label">Active funds</div>
                <div class="hero-stat-value" id="stat-active">—</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-label">Inactive funds</div>
                <div class="hero-stat-value" id="stat-inactive">—</div>
              </div>
              <div class="hero-stat">
                <div
                  class="hero-stat-label"
                  title="Sum of every SIP / lump cashflow (minus withdrawals), not the monthly SIP column. Your banking sheet has one cell per month per fund — adding months adds to this total."
                >
                  Lifetime contributed
                </div>
                <div class="hero-stat-value" id="stat-invested">—</div>
              </div>
              <div class="hero-stat">
                <div
                  class="hero-stat-label"
                  title="Today’s Czech fund book minus lifetime contributed (from cashflows), as a % of that contributed total. Not CAGR / XIRR."
                >
                  Gain vs contributed
                </div>
                <div class="hero-stat-value" id="stat-gain">—</div>
              </div>
            </div>
          </section>

          <section class="card" style="margin-bottom: var(--space-5);">
            <div class="card-header">
              <div>
                <h2 class="card-title">All holdings</h2>
                <p class="card-subtitle" id="holdings-subtitle">—</p>
              </div>
            </div>
            <div class="table-wrap">
              <table class="table" id="holdings-table">
                <thead>
                  <tr>
                    <th scope="col">Fund</th>
                    <th scope="col">Status</th>
                    <th scope="col">Category</th>
                    <th class="num" scope="col">Units</th>
                    <th class="num" scope="col">NAV</th>
                    <th class="num" scope="col">Value</th>
                    <th class="num" scope="col">SIP</th>
                    <th scope="col">Tax-free</th>
                    <th scope="col" aria-label="Actions"></th>
                  </tr>
                </thead>
                <tbody id="holdings-tbody">
                  <tr>
                    <td colspan="9" class="empty-state">
                      <div class="empty-state-message">Loading…</div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="/scripts/sidebar.js"></script>
    <script src="/scripts/shell.js"></script>
    <script src="/scripts/pageHealth.js"></script>
    <script src="/scripts/fetchJson.js"></script>
    <script src="/scripts/pieUi.js"></script>
    <script src="/scripts/portfolio.js"></script>
  </body>
</html>
