<!doctype html>
<html lang="en" class="preload">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ARTHA — Reports</title>
    <script src="/scripts/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Main navigation"></aside>
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <main class="main-area">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="topbar-menu-trigger"
              aria-label="Open menu"
              id="menu-toggle"
              type="button"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                aria-hidden="true"
              >
                <path d="M2 4 H14 M2 8 H14 M2 12 H14" />
              </svg>
            </button>
            <h1 class="topbar-page-title">Reports</h1>
          </div>
          <div class="topbar-actions">
            <button class="btn btn-ghost btn-sm" id="refresh-btn" aria-label="Refresh" type="button">
              Refresh
            </button>
            <button class="btn btn-secondary btn-sm" id="generate-internal" type="button">
              Internal
            </button>
            <button class="btn btn-primary btn-sm" id="generate-client" type="button">
              Client
            </button>
          </div>
        </header>

        <div class="content">
          <section class="overview-hero" id="hero">
            <div class="hero-eyebrow">CFO snapshots</div>
            <div class="hero-value-row">
              <div class="hero-value" id="hero-count">—</div>
            </div>
            <div class="hero-meta">10-section monthly report. Internal includes full position names; Client uses rounded figures, safe to share.</div>

            <div class="hero-stats" style="grid-template-columns: repeat(3, 1fr);">
              <div class="hero-stat">
                <div class="hero-stat-label">Last generated</div>
                <div class="hero-stat-value" id="stat-last" style="font-size: var(--text-md);">—</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-label">Internal reports</div>
                <div class="hero-stat-value" id="stat-internal">—</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-label">Client reports</div>
                <div class="hero-stat-value" id="stat-client">—</div>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div>
                <h2 class="card-title">Recent reports</h2>
                <p class="card-subtitle" id="list-subtitle">Loading…</p>
              </div>
            </div>
            <div class="table-wrap">
              <table class="table" id="reports-table">
                <thead>
                  <tr>
                    <th scope="col">Generated</th>
                    <th scope="col">Type</th>
                    <th scope="col">Audience</th>
                    <th scope="col">Period</th>
                    <th scope="col">Actions</th>
                  </tr>
                </thead>
                <tbody id="reports-tbody">
                  <tr>
                    <td colspan="5" class="empty-state">
                      <div class="empty-state-message">Loading…</div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="/scripts/sidebar.js"></script>
    <script src="/scripts/shell.js"></script>
    <script src="/scripts/reports.js"></script>
  </body>
</html>
