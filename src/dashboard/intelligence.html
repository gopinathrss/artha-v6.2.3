<!doctype html>
<html lang="en" class="preload">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/assets/pie-logo.svg" type="image/svg+xml" />
    <title>PIE — Ask PIE</title>
    <script src="/scripts/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Main navigation"></aside>
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <main class="main-area">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="topbar-menu-trigger"
              aria-label="Open menu"
              id="menu-toggle"
              type="button"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                aria-hidden="true"
              >
                <path d="M2 4 H14 M2 8 H14 M2 12 H14" />
              </svg>
            </button>
            <h1 class="topbar-page-title">Ask PIE</h1>
          </div>
          <div class="topbar-actions">
            <a href="/this-month" class="btn btn-primary btn-sm">This month</a>
          </div>
        </header>

        <div class="content">
          <section class="card" style="margin-bottom: var(--space-5);">
            <div class="card-header">
              <div>
                <h2 class="card-title">Conversation</h2>
                <p class="card-subtitle">Answers use your portfolio + library context, not the open web.</p>
              </div>
            </div>

            <div id="chat-window" class="chat-window">
              <div class="chat-msg chat-msg-assistant">
                <strong>Hi — I'm PIE.</strong> Ask me anything about your portfolio, allocation,
                tax window, or upcoming retirement. Try one of the suggestions below or type a
                question directly.
              </div>
            </div>

            <div class="chat-suggestions" id="chat-suggestions"></div>

            <div id="track-record-callout" class="callout" style="margin: var(--space-4) 0; display: none"></div>

            <div class="chat-composer">
              <textarea
                id="chat-input"
                class="form-field-textarea"
                placeholder="e.g. What should I do this month?"
                aria-label="Your question"
              ></textarea>
              <button class="btn btn-primary" id="chat-send" type="button">Ask</button>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div>
                <h2 class="card-title">History</h2>
                <p class="card-subtitle" id="history-subtitle">Loading…</p>
              </div>
            </div>
            <div id="history-list"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="/scripts/sidebar.js"></script>
    <script src="/scripts/shell.js"></script>
    <script src="/scripts/intelligence.js"></script>
  </body>
</html>
