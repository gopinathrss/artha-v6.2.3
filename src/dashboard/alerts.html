<!doctype html>
<html lang="en" class="preload">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PIE — Alerts</title>
    <script src="/scripts/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Main navigation"></aside>
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <main class="main-area">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="topbar-menu-trigger"
              aria-label="Open menu"
              id="menu-toggle"
              type="button"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                aria-hidden="true"
              >
                <path d="M2 4 H14 M2 8 H14 M2 12 H14" />
              </svg>
            </button>
            <h1 class="topbar-page-title">Alerts</h1>
          </div>
          <div class="topbar-actions">
            <label class="toggle-row" style="border: none; padding: 0; gap: var(--space-2);">
              <span class="toggle-row-text" style="font-size: var(--text-xs); color: var(--color-text-tertiary);">Show dismissed</span>
              <span class="toggle">
                <input type="checkbox" id="show-dismissed" />
                <span class="toggle-slider"></span>
              </span>
            </label>
            <button class="btn btn-primary btn-sm" id="evaluate-btn" type="button">
              Run evaluation
            </button>
          </div>
        </header>

        <div class="content">
          <section class="overview-hero" id="hero">
            <div class="hero-eyebrow">Alert log</div>
            <div class="hero-value-row">
              <div class="hero-value" id="hero-active">—</div>
            </div>
            <div class="hero-meta" id="hero-sub">—</div>

            <div class="hero-stats">
              <div class="hero-stat">
                <div class="hero-stat-label">Active</div>
                <div class="hero-stat-value" id="stat-active">—</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-label">Resolved</div>
                <div class="hero-stat-value" id="stat-resolved">—</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-label">Dismissed</div>
                <div class="hero-stat-value" id="stat-dismissed">—</div>
              </div>
              <div class="hero-stat">
                <div class="hero-stat-label">Critical</div>
                <div class="hero-stat-value" id="stat-critical">—</div>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div>
                <h2 class="card-title">Recent alerts</h2>
                <p class="card-subtitle" id="list-subtitle">Loading…</p>
              </div>
            </div>
            <div id="alert-list"></div>
            <p id="alerts-retention-note" class="form-field-help" style="margin-top: var(--space-4)"></p>
          </section>
        </div>
      </main>
    </div>

    <script src="/scripts/sidebar.js"></script>
    <script src="/scripts/shell.js"></script>
    <script src="/scripts/alerts.js"></script>
  </body>
</html>
